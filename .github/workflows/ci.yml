name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/arteffect_test
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      PAYLOAD_SECRET: ci-only-payload-secret-that-is-never-used-outside-tests
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: arteffect_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arteffect_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run payload:migrate
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
